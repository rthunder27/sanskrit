name: sanskrit_app
description: Sanskrit self-learning app — flashcards, quiz, reference chart, and spaced repetition review.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Type-safe SQLite ORM for local persistence (SRS review history)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code generation for drift database classes
  build_runner: ^2.4.0
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
